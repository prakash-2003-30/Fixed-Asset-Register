services:
  - type: web
    name: far-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run prisma:migrate && npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: "*"
